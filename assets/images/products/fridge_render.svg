<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1400" viewBox="0 0 1000 1400">
<defs>
  <radialGradient id="vign" cx="50%" cy="45%" r="75%">
    <stop offset="0%" stop-color="#1a0f33"/>
    <stop offset="55%" stop-color="#0d0819"/>
    <stop offset="100%" stop-color="#08060d"/>
  </radialGradient>
  <linearGradient id="goldSide" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#6b4f14"/>
    <stop offset="18%" stop-color="#a8842a"/>
    <stop offset="42%" stop-color="#f3ddA0"/>
    <stop offset="50%" stop-color="#fdf3cf"/>
    <stop offset="58%" stop-color="#f3dda0"/>
    <stop offset="82%" stop-color="#a8842a"/>
    <stop offset="100%" stop-color="#6b4f14"/>
  </linearGradient>
  <radialGradient id="goldTop" cx="50%" cy="38%" r="75%">
    <stop offset="0%" stop-color="#f8ecc0"/>
    <stop offset="55%" stop-color="#dcb84e"/>
    <stop offset="100%" stop-color="#9a7620"/>
  </radialGradient>
  <linearGradient id="steelSide" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#3a3f4a"/>
    <stop offset="20%" stop-color="#7d8694"/>
    <stop offset="48%" stop-color="#e8edf4"/>
    <stop offset="55%" stop-color="#f7fafc"/>
    <stop offset="75%" stop-color="#7d8694"/>
    <stop offset="100%" stop-color="#343943"/>
  </linearGradient>
  <radialGradient id="steelTop" cx="50%" cy="40%" r="75%">
    <stop offset="0%" stop-color="#eef2f7"/>
    <stop offset="60%" stop-color="#9aa3b0"/>
    <stop offset="100%" stop-color="#4d545f"/>
  </radialGradient>
  <linearGradient id="rod" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#7a5c18"/>
    <stop offset="45%" stop-color="#e9d290"/>
    <stop offset="55%" stop-color="#f7ecc4"/>
    <stop offset="100%" stop-color="#7a5c18"/>
  </linearGradient>
  <linearGradient id="rodSteel" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#4a505b"/>
    <stop offset="45%" stop-color="#c9d2dc"/>
    <stop offset="55%" stop-color="#eef3f8"/>
    <stop offset="100%" stop-color="#454b55"/>
  </linearGradient>
  <radialGradient id="chipGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#f00090" stop-opacity=".85"/>
    <stop offset="40%" stop-color="#f00090" stop-opacity=".35"/>
    <stop offset="100%" stop-color="#f00090" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="floorGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#503090" stop-opacity=".5"/>
    <stop offset="100%" stop-color="#503090" stop-opacity="0"/>
  </radialGradient>
  <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="7"/>
  </filter>
  <filter id="soft2" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="16"/>
  </filter>
</defs>

<rect width="1000" height="1400" fill="url(#vign)"/>

<!-- floor glow + reflection -->
<ellipse cx="500" cy="1300" rx="330" ry="52" fill="url(#floorGlow)"/>
<ellipse cx="500" cy="1296" rx="220" ry="26" fill="#0c0918"/>

<!-- ================= fridge, hanging from top frame ================= -->

<!-- pulse tube + top hardware (behind top flange) -->
<g>
  <rect x="392" y="60" width="86" height="120" fill="url(#steelSide)"/>
  <ellipse cx="435" cy="60" rx="43" ry="12" fill="url(#steelTop)"/>
  <ellipse cx="435" cy="180" rx="43" ry="12" fill="#2e333c"/>
  <rect x="560" y="90" width="56" height="92" fill="url(#steelSide)"/>
  <ellipse cx="588" cy="90" rx="28" ry="8" fill="url(#steelTop)"/>
  <rect x="497" y="100" width="14" height="80" fill="url(#rodSteel)"/>
  <!-- bellows hose arcing to the side -->
  <path d="M478 80 C 620 20, 760 60, 800 150" stroke="#8a93a1" stroke-width="16" fill="none" stroke-linecap="round"/>
  <path d="M478 80 C 620 20, 760 60, 800 150" stroke="#d7dde5" stroke-width="5" fill="none" stroke-linecap="round" stroke-dasharray="3 7"/>
</g>

<!-- 300 K top plate -->
<g>
  <rect x="230" y="188" width="540" height="34" fill="url(#goldSide)"/>
  <ellipse cx="500" cy="222" rx="270" ry="58" fill="#5d4512"/>
  <ellipse cx="500" cy="188" rx="270" ry="58" fill="url(#goldTop)"/>
  <ellipse cx="500" cy="188" rx="270" ry="58" fill="none" stroke="#fdf3cf" stroke-opacity=".5" stroke-width="2"/>
</g>

<!-- rods 300K -> 50K -->
<g>
  <rect x="330" y="238" width="11" height="120" fill="url(#rod)"/>
  <rect x="659" y="238" width="11" height="120" fill="url(#rod)"/>
  <rect x="494" y="246" width="11" height="112" fill="url(#rod)" opacity=".75"/>
</g>

<!-- 50 K plate -->
<g>
  <ellipse cx="500" cy="392" rx="252" ry="50" fill="#100a1e" opacity=".55" filter="url(#soft)"/>
  <rect x="260" y="358" width="480" height="30" fill="url(#goldSide)"/>
  <ellipse cx="500" cy="388" rx="240" ry="50" fill="#5d4512"/>
  <ellipse cx="500" cy="358" rx="240" ry="50" fill="url(#goldTop)"/>
</g>

<!-- rods 50K -> 4K -->
<g>
  <rect x="352" y="400" width="11" height="126" fill="url(#rod)"/>
  <rect x="637" y="400" width="11" height="126" fill="url(#rod)"/>
  <rect x="494" y="408" width="11" height="118" fill="url(#rod)" opacity=".75"/>
</g>

<!-- 4 K plate -->
<g>
  <ellipse cx="500" cy="562" rx="222" ry="44" fill="#100a1e" opacity=".55" filter="url(#soft)"/>
  <rect x="290" y="528" width="420" height="30" fill="url(#goldSide)"/>
  <ellipse cx="500" cy="558" rx="210" ry="44" fill="#5d4512"/>
  <ellipse cx="500" cy="528" rx="210" ry="44" fill="url(#goldTop)"/>
</g>

<!-- rods 4K -> still -->
<g>
  <rect x="374" y="568" width="10" height="126" fill="url(#rod)"/>
  <rect x="616" y="568" width="10" height="126" fill="url(#rod)"/>
  <rect x="495" y="576" width="10" height="118" fill="url(#rod)" opacity=".75"/>
</g>

<!-- still plate -->
<g>
  <ellipse cx="500" cy="730" rx="192" ry="38" fill="#100a1e" opacity=".55" filter="url(#soft)"/>
  <rect x="320" y="698" width="360" height="28" fill="url(#goldSide)"/>
  <ellipse cx="500" cy="726" rx="180" ry="38" fill="#5d4512"/>
  <ellipse cx="500" cy="698" rx="180" ry="38" fill="url(#goldTop)"/>
</g>

<!-- silver still tank hanging below still plate -->
<g>
  <rect x="440" y="742" width="120" height="66" fill="url(#steelSide)"/>
  <ellipse cx="500" cy="742" rx="60" ry="16" fill="#767f8c"/>
  <ellipse cx="500" cy="808" rx="60" ry="16" fill="url(#steelTop)"/>
</g>

<!-- rods still -> MXC -->
<g>
  <rect x="392" y="738" width="10" height="132" fill="url(#rod)"/>
  <rect x="598" y="738" width="10" height="132" fill="url(#rod)"/>
</g>

<!-- mixing chamber plate -->
<g>
  <ellipse cx="500" cy="906" rx="162" ry="33" fill="#100a1e" opacity=".55" filter="url(#soft)"/>
  <rect x="350" y="876" width="300" height="26" fill="url(#goldSide)"/>
  <ellipse cx="500" cy="902" rx="150" ry="32" fill="#5d4512"/>
  <ellipse cx="500" cy="876" rx="150" ry="32" fill="url(#goldTop)"/>
</g>

<!-- ============ cabling ============ -->
<g fill="none" stroke-linecap="round">
  <!-- copper loom left -->
  <path d="M300 230 C 200 320, 210 320, 285 372" stroke="#b87333" stroke-width="7" opacity=".95"/>
  <path d="M285 400 C 205 470, 220 480, 310 542" stroke="#b87333" stroke-width="7" opacity=".95"/>
  <path d="M310 570 C 240 630, 250 650, 340 710" stroke="#b87333" stroke-width="6" opacity=".95"/>
  <path d="M340 738 C 285 790, 295 830, 372 886" stroke="#b87333" stroke-width="6" opacity=".95"/>
  <!-- highlight strands -->
  <path d="M300 230 C 200 320, 210 320, 285 372" stroke="#e8a566" stroke-width="2.4"/>
  <path d="M285 400 C 205 470, 220 480, 310 542" stroke="#e8a566" stroke-width="2.4"/>
  <path d="M310 570 C 240 630, 250 650, 340 710" stroke="#e8a566" stroke-width="2"/>
  <path d="M340 738 C 285 790, 295 830, 372 886" stroke="#e8a566" stroke-width="2"/>
  <!-- silver coax right -->
  <path d="M700 230 C 800 320, 790 330, 715 372" stroke="#9aa3b0" stroke-width="5"/>
  <path d="M715 400 C 800 470, 780 490, 690 542" stroke="#9aa3b0" stroke-width="5"/>
  <path d="M690 570 C 765 630, 750 660, 660 710" stroke="#9aa3b0" stroke-width="4.5"/>
  <path d="M660 738 C 720 795, 705 840, 628 886" stroke="#9aa3b0" stroke-width="4.5"/>
  <path d="M700 230 C 800 320, 790 330, 715 372" stroke="#e6ebf1" stroke-width="1.6"/>
  <path d="M715 400 C 800 470, 780 490, 690 542" stroke="#e6ebf1" stroke-width="1.6"/>
  <path d="M690 570 C 765 630, 750 660, 660 710" stroke="#e6ebf1" stroke-width="1.4"/>
  <path d="M660 738 C 720 795, 705 840, 628 886" stroke="#e6ebf1" stroke-width="1.4"/>
  <!-- inner thin lines -->
  <path d="M420 246 C 400 300, 405 320, 430 360" stroke="#c9a437" stroke-width="3" opacity=".8"/>
  <path d="M560 408 C 585 460, 580 490, 556 530" stroke="#c9a437" stroke-width="3" opacity=".8"/>
  <path d="M440 576 C 420 630, 425 660, 450 700" stroke="#c9a437" stroke-width="3" opacity=".8"/>
</g>

<!-- ============ sample: chip below MXC with pink glow ============ -->
<circle cx="500" cy="1010" r="130" fill="url(#chipGlow)"/>
<g>
  <rect x="493" y="908" width="14" height="52" fill="url(#rod)"/>
  <g transform="translate(500 992)">
    <rect x="-64" y="-34" width="128" height="68" rx="6" fill="#170f2c" stroke="#f00090" stroke-width="2"/>
    <g stroke="#f00090" stroke-width="2.4" fill="none" opacity=".95">
      <path d="M-46 -14 h34 v14 h24"/>
      <path d="M-46 16 h24 v-12 h30"/>
      <path d="M22 -18 q14 18 0 34"/>
    </g>
    <g fill="#ff4db8">
      <circle cx="-46" cy="-14" r="3.4"/>
      <circle cx="12" cy="0" r="3.4"/>
      <circle cx="-22" cy="4" r="3.4"/>
      <circle cx="22" cy="16" r="3.4"/>
    </g>
  </g>
</g>

<!-- ============ QuantaMap logo ============ -->
<g transform="translate(64 64)">
  <g transform="scale(1.15)">
    <path d="M30 4C15.6 4 4 15.6 4 30c0 19.5 26 40 26 40s26-20.5 26-40C56 15.6 44.4 4 30 4z" fill="#503090"/>
    <circle cx="30" cy="27" r="12" fill="#f00090"/>
    <circle cx="30" cy="27" r="5.5" fill="#0d0819"/>
  </g>
  <text x="82" y="55" font-family="Lato" font-weight="300" font-size="46" fill="#ffffff" letter-spacing="1">QuantaMap</text>
</g>

</svg>
